<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Wolverine blend: two overlapping backbone structures (BPC-157 + GHK-Cu) -->
  <!-- BPC-157 backbone (longer, zigzag, top layer) -->
  <line x1="8" y1="72" x2="16" y2="50" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="16" y1="50" x2="24" y2="66" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="24" y1="66" x2="32" y2="44" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="32" y1="44" x2="40" y2="62" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="40" y1="62" x2="48" y2="40" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="48" y1="40" x2="56" y2="58" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="56" y1="58" x2="64" y2="36" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="64" y1="36" x2="72" y2="54" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="72" y1="54" x2="80" y2="32" stroke="#1F2937" stroke-width="1.5"/>
  <!-- GHK-Cu tripeptide backbone (overlapping, bottom layer, dashed for contrast) -->
  <line x1="30" y1="82" x2="60" y2="66" stroke="#7090AB" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.75"/>
  <line x1="60" y1="66" x2="90" y2="82" stroke="#7090AB" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.75"/>
  <!-- Cu center on GHK-Cu overlay -->
  <circle cx="60" cy="66" r="7" fill="#7090AB" stroke="#1F2937" stroke-width="1.5" opacity="0.7"/>
  <text x="60" y="70" text-anchor="middle" font-size="6" fill="white" font-family="monospace">Cu²⁺</text>
  <!-- BPC-157 nodes -->
  <circle cx="8" cy="72" r="3.5" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="16" cy="50" r="3.5" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="24" cy="66" r="3.5" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="32" cy="44" r="3.5" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="40" cy="62" r="3.5" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="48" cy="40" r="3.5" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="56" cy="58" r="3.5" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="64" cy="36" r="3.5" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="72" cy="54" r="3.5" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="80" cy="32" r="3.5" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <!-- GHK-Cu endpoint nodes -->
  <circle cx="30" cy="82" r="4" fill="#E5E7EB" stroke="#7090AB" stroke-width="1.5" opacity="0.85"/>
  <circle cx="90" cy="82" r="4" fill="#E5E7EB" stroke="#7090AB" stroke-width="1.5" opacity="0.85"/>
  <!-- Label -->
  <text x="60" y="102" text-anchor="middle" font-size="8" fill="#1F2937" font-family="monospace">Wolverine</text>
  <text x="60" y="112" text-anchor="middle" font-size="6" fill="#6B7280" font-family="monospace">BPC-157 + GHK-Cu</text>
</svg>
