<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- GLP-3 (triple receptor agonist): triple-strand motif -->
  <!-- Strand A (left) -->
  <path d="M 22 82 C 18 72 24 62 22 52 C 20 42 26 34 24 24 C 25 18 32 15 36 20"
        stroke="#1F2937" stroke-width="1.5" fill="none"/>
  <!-- Strand B (center) -->
  <path d="M 60 86 C 56 76 64 66 60 56 C 56 46 64 36 60 26 C 58 18 64 14 68 18"
        stroke="#1F2937" stroke-width="1.5" fill="none"/>
  <!-- Strand C (right) -->
  <path d="M 98 82 C 102 72 96 62 98 52 C 100 42 94 34 96 24 C 95 18 88 15 84 20"
        stroke="#1F2937" stroke-width="1.5" fill="none"/>
  <!-- Cross-rungs between strands A-B -->
  <line x1="22" y1="66" x2="62" y2="66" stroke="#7090AB" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
  <line x1="22" y1="48" x2="62" y2="48" stroke="#7090AB" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
  <line x1="24" y1="32" x2="62" y2="32" stroke="#7090AB" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
  <!-- Cross-rungs between strands B-C -->
  <line x1="58" y1="66" x2="98" y2="66" stroke="#7090AB" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
  <line x1="58" y1="48" x2="98" y2="48" stroke="#7090AB" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
  <line x1="60" y1="32" x2="96" y2="32" stroke="#7090AB" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
  <!-- Nodes strand A -->
  <circle cx="22" cy="82" r="3" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="22" cy="66" r="3" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="22" cy="48" r="3" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="24" cy="32" r="3" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="36" cy="20" r="3.5" fill="#7090AB" stroke="#1F2937" stroke-width="1.5" opacity="0.8"/>
  <!-- Nodes strand B -->
  <circle cx="60" cy="86" r="3" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="62" cy="66" r="3" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="62" cy="48" r="3" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="62" cy="32" r="3" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="68" cy="18" r="3.5" fill="#7090AB" stroke="#1F2937" stroke-width="1.5" opacity="0.8"/>
  <!-- Nodes strand C -->
  <circle cx="98" cy="82" r="3" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="98" cy="66" r="3" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="98" cy="48" r="3" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="96" cy="32" r="3" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="84" cy="20" r="3.5" fill="#7090AB" stroke="#1F2937" stroke-width="1.5" opacity="0.8"/>
  <!-- Top join arc -->
  <path d="M 36 20 Q 60 10 84 20" stroke="#1F2937" stroke-width="1" stroke-dasharray="2 2" fill="none" opacity="0.5"/>
  <!-- Label -->
  <text x="60" y="102" text-anchor="middle" font-size="8" fill="#1F2937" font-family="monospace">GLP-3</text>
  <text x="60" y="112" text-anchor="middle" font-size="6" fill="#6B7280" font-family="monospace">triple agonist</text>
</svg>
