  <!-- Label -->
  <text x="60" y="100" text-anchor="middle" font-size="8" fill="#1F2937" font-family="monospace">Ipamorelin</text>
  <text x="60" y="110" text-anchor="middle" font-size="6" fill="#6B7280" font-family="monospace">5 aa · GHSR</text>
