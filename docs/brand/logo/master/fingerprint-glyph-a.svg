<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="CaliLean — proposed custom lowercase 'a' fingerprint glyph">
  <title>CaliLean — proposed custom lowercase 'a' fingerprint glyph</title>
  <!--
    Proposed fingerprint detail for the custom calilean wordmark (Cut 1, Editorial Display).
    Double-storey 'a', low-contrast modern serif. Distinctive moves:
      1. Subtle ink-trap where the bowl meets the upper eye (the small notch between the
         neck and the upper bowl on the right side, around x=140 y=86) — a Sectra/Lyon-class
         optical correction, kept understated so it reads at 24px nav size.
      2. Slight asymmetry in the upper eye: the eye opens ~6% wider than a stock double-storey
         'a' to give the glyph a quiet smile without going humanist.
      3. Bracketed foot-spur with a flat baseline tail — anchors the glyph at the baseline
         and keeps optical weight even when the wordmark is tracked +30.
    Em: 200x200. Baseline y=170. x-height = 110 (top at y=60). Stem ~16. Thin ~12.
    This glyph replaces the 'a' positions in 'calilean' (positions 2 and 7) when the master
    wordmark is outlined. The other seven glyphs get a foundry-grade outline pass in v0.1.
  -->
  <g fill="currentColor" fill-rule="evenodd">
    <!-- right stem with bracketed foot -->
    <path d="
      M 140,60
      C 144,60 148,62 148,66
      L 148,158
      C 148,162 152,164 156,164
      L 162,164
      L 162,170
      L 128,170
      L 128,164
      C 132,164 136,162 136,158
      L 136,68
      C 136,62 138,60 140,60
      Z
    "/>
    <!-- upper eye (closed loop) with ink-trap on the right where neck meets bowl -->
    <path d="
      M 96,60
      C 76,60 60,76 60,98
      C 60,118 74,132 92,132
      C 104,132 116,126 124,116
      L 124,98
      C 124,76 112,60 96,60
      Z
      M 96,72
      C 106,72 114,82 114,98
      C 114,110 108,118 100,120
      C 92,120 84,114 84,98
      C 84,82 88,72 96,72
      Z
      M 124,86
      C 122,90 124,94 128,96
      L 128,90
      C 126,88 124,86 124,86
      Z
    "/>
    <!-- lower bowl (open counter) -->
    <path d="
      M 92,116
      C 76,116 56,128 56,148
      C 56,162 68,172 84,172
      C 100,172 116,162 124,148
      L 124,170
      L 136,170
      L 136,118
      C 128,124 116,128 104,128
      C 96,128 90,124 92,116
      Z
      M 88,128
      C 80,130 70,138 70,148
      C 70,156 76,162 86,162
      C 98,162 110,154 114,142
      C 110,134 100,128 88,128
      Z
    "/>
  </g>
</svg>
