<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" role="img" aria-label="CaliLean — Safari pinned-tab mask">
  <title>CaliLean Safari pinned-tab mask</title>
  <!--
    Safari pinned-tab mask. Single-color silhouette. Apple's pinned-tab pipeline ignores fills/strokes
    and applies the user's accent tint, so this must be a pure path (no fill attribute, no styles).
    Geometry mirrors favicon-c.svg, simplified for 16px rendering.
  -->
  <path d="
    M 8,2
    C 4.5,2 2,4.7 2,8
    C 2,11.3 4.5,14 8,14
    C 10,14 11.7,13 12.7,11.5
    L 11,10.5
    C 10.3,11.5 9.3,12 8,12
    C 5.5,12 4,10.3 4,8
    C 4,5.7 5.5,4 8,4
    C 9.3,4 10.3,4.5 11,5.5
    L 12.7,4.5
    C 11.7,3 10,2 8,2
    Z
  "/>
</svg>
