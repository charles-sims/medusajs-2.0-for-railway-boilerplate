<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Glow (Glutathione): γ-Glu-Cys-Gly tripeptide with thiol -SH group -->
  <!-- Backbone: 3 nodes in extended chain -->
  <line x1="22" y1="55" x2="60" y2="45" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="60" y1="45" x2="98" y2="55" stroke="#1F2937" stroke-width="1.5"/>
  <!-- Thiol group (-SH) off Cys (center node) -->
  <line x1="60" y1="45" x2="60" y2="28" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="60" y1="28" x2="72" y2="18" stroke="#1F2937" stroke-width="1"/>
  <!-- S atom -->
  <circle cx="60" cy="28" r="5" fill="#7090AB" stroke="#1F2937" stroke-width="1.5" opacity="0.85"/>
  <text x="60" y="31" text-anchor="middle" font-size="7" fill="white" font-family="monospace">S</text>
  <!-- H on thiol -->
  <circle cx="72" cy="18" r="3" fill="#E5E7EB" stroke="#1F2937" stroke-width="1"/>
  <text x="72" y="21" text-anchor="middle" font-size="5" fill="#1F2937" font-family="monospace">H</text>
  <!-- γ-peptide bond indicator (unconventional linkage on Glu) -->
  <path d="M 22 55 Q 10 42 20 30" stroke="#1F2937" stroke-width="1" stroke-dasharray="2 2" fill="none" opacity="0.5"/>
  <circle cx="20" cy="30" r="3" fill="#E5E7EB" stroke="#1F2937" stroke-width="1" opacity="0.6"/>
  <text x="14" y="24" text-anchor="middle" font-size="5" fill="#6B7280" font-family="monospace">γ</text>
  <!-- Amino acid nodes -->
  <circle cx="22" cy="55" r="7" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <text x="22" y="59" text-anchor="middle" font-size="6" fill="#1F2937" font-family="monospace">Glu</text>
  <circle cx="60" cy="45" r="7" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <text x="60" y="49" text-anchor="middle" font-size="6" fill="#1F2937" font-family="monospace">Cys</text>
  <circle cx="98" cy="55" r="7" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <text x="98" y="59" text-anchor="middle" font-size="6" fill="#1F2937" font-family="monospace">Gly</text>
  <!-- Label -->
  <text x="60" y="88" text-anchor="middle" font-size="8" fill="#1F2937" font-family="monospace">Glow</text>
  <text x="60" y="98" text-anchor="middle" font-size="6" fill="#6B7280" font-family="monospace">glutathione · GSH</text>
</svg>
