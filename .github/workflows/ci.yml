name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ci
      JWT_SECRET: ci-build-only
      COOKIE_SECRET: ci-build-only
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: apps/backend
        run: pnpm build

  test-backend:
    name: Test Backend (jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Unit tests + coverage
        working-directory: apps/backend
        run: pnpm test:coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/backend/coverage
          if-no-files-found: ignore

  build-storefront:
    name: Build Storefront
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://localhost:9000
      NEXT_PUBLIC_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_test_placeholder
      NEXT_PUBLIC_DEFAULT_REGION: us
      NEXT_PUBLIC_SEARCH_ENDPOINT: http://localhost:7700
      NEXT_PUBLIC_SEARCH_API_KEY: test
      NEXT_PUBLIC_INDEX_NAME: products
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: apps/storefront
        run: pnpm lint
      - name: Build
        working-directory: apps/storefront
        run: pnpm build:next

  typecheck-storefront:
    name: Typecheck Storefront
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: tsc --noEmit
        working-directory: apps/storefront
        run: pnpm typecheck

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: medusa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/medusa
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret
      COOKIE_SECRET: ci-cookie-secret
      ADMIN_CORS: http://localhost:7000,http://localhost:7001,http://localhost:8000
      AUTH_CORS: http://localhost:7000,http://localhost:7001,http://localhost:8000
      STORE_CORS: http://localhost:8000
      MEDUSA_ADMIN_EMAIL: admin@calilean.test
      MEDUSA_ADMIN_PASSWORD: supersecret
      MEDUSA_DISABLE_ADMIN: "true"
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://localhost:9000
      NEXT_PUBLIC_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_DEFAULT_REGION: us
      NEXT_PUBLIC_SEARCH_ENDPOINT: http://localhost:7700
      NEXT_PUBLIC_SEARCH_API_KEY: test
      NEXT_PUBLIC_INDEX_NAME: products
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize backend (migrate + seed)
        working-directory: apps/backend
        run: pnpm ib

      - name: Start backend (dev mode)
        working-directory: apps/backend
        run: |
          nohup pnpm dev > "$RUNNER_TEMP/backend.log" 2>&1 &
          echo $! > backend.pid

      - name: Wait for backend health
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:9000/health > /dev/null; then
              echo "Backend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to come up"
          tail -200 "$RUNNER_TEMP/backend.log" || true
          exit 1

      - name: Resolve publishable key
        id: pk
        run: |
          KEY=$(curl -sf http://localhost:9000/key-exchange | jq -r '.publishableApiKey // empty')
          if [ -z "$KEY" ]; then
            echo "key-exchange returned no publishableApiKey — seed may not have created a 'Webshop' key"
            exit 1
          fi
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Install Playwright browsers
        working-directory: apps/storefront
        run: pnpm exec playwright install --with-deps chromium

      - name: Build storefront
        working-directory: apps/storefront
        env:
          NODE_ENV: production
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${{ steps.pk.outputs.key }}
        run: pnpm build:next

      - name: Run Playwright tests
        working-directory: apps/storefront
        env:
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${{ steps.pk.outputs.key }}
          CI: "true"
        run: pnpm test-e2e

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-backend-log
          path: ${{ runner.temp }}/backend.log
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/storefront/playwright-report
          if-no-files-found: ignore
