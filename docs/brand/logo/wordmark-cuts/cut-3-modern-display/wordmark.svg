<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" role="img" aria-label="CaliLean wordmark — Modern Display cut">
  <title>CaliLean wordmark — Modern Display cut (Domaine Display reference)</title>
  <!--
    Cut 3 — Modern Display.
    Reference families: Domaine Display, GT Super Display. Higher-contrast modern, more editorial-fashion.
    Web fallback used here: Playfair Display (high-contrast, didone-leaning display serif).
    Spec: lowercase, single weight (regular), +30 tracking.
    Risk per brief: skews fashion. Compensate with restraint elsewhere.
  -->
  <text x="0" y="60"
        font-family="'Playfair Display', 'Domaine Display', 'GT Super Display', 'Times New Roman', serif"
        font-size="68"
        font-weight="400"
        letter-spacing="3"
        fill="currentColor">calilean</text>
</svg>
