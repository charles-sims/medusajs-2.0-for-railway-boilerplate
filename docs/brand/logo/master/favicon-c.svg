<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="CaliLean — favicon, lowercase c">
  <title>CaliLean favicon — lowercase 'c'</title>
  <!--
    Favicon master, v0. Lowercase 'c' lockup since the monogram is deferred to v2 (per identity-brief.md §6).
    Renders the wordmark's own lowercase 'c' from the same font stack — same cut family, same Regular weight,
    same terminal treatment. Per CMO note 2026-04-26: "the wordmark's c, not a new mark."
    At 16/32px favicon raster, sharp's text rasterizer + currentColor produces a clean Iron-on-Salt mark.
    A path-outlined v0.1 favicon will be cut alongside the wordmark outline pass.
  -->
  <text x="32" y="48" text-anchor="middle"
        font-family="'Fraunces', 'GT Sectra Display', 'Domaine Display', 'Times New Roman', serif"
        font-size="56"
        font-weight="400"
        font-style="normal"
        font-stretch="normal"
        font-variation-settings="'opsz' 144, 'SOFT' 30, 'WONK' 0"
        fill="currentColor">c</text>
</svg>
