<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" role="img" aria-label="CaliLean wordmark with clinician rule — Editorial Display">
  <title>CaliLean wordmark with clinician rule — Editorial Display</title>
  <!-- Formal lockup variant per brief §6: wordmark + horizontal rule + clinician-of-record line -->
  <text x="0" y="58"
        font-family="'Fraunces', 'GT Sectra Display', 'Domaine Display', 'Times New Roman', serif"
        font-size="64"
        font-weight="400"
        letter-spacing="3"
        fill="currentColor">calilean</text>
  <line x1="0" y1="78" x2="280" y2="78" stroke="currentColor" stroke-width="1"/>
  <text x="0" y="100"
        font-family="'Söhne', 'Inter', system-ui, sans-serif"
        font-size="14"
        font-weight="400"
        letter-spacing="2"
        text-transform="uppercase"
        fill="currentColor">Reviewed by [Dr. Name], MD</text>
</svg>
