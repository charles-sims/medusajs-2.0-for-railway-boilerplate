<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Melanotan-2: cyclic heptapeptide, 7 nodes in a ring -->
  <!-- Heptagon ring — 7 nodes evenly spaced on a circle r=34, center (60,56) -->
  <!-- Angles: 90, 141.4, 192.9, 244.3, 295.7, 347.1, 38.6 degrees -->
  <!-- Node positions (r=34):
    0: 60+34*cos(90°)=60, 56-34*sin(90°)=22
    1: 60+34*cos(141.4°)=60-26.6=33, 56-34*sin(141.4°)=56-21.2=35
    2: 60+34*cos(192.9°)=60-33.1=27, 56-34*sin(192.9°)=56+7.5=64
    3: 60+34*cos(244.3°)=60-14.8=45, 56-34*sin(244.3°)=56+30.6=87
    4: 60+34*cos(295.7°)=60+14.8=75, 56-34*sin(295.7°)=56+30.6=87
    5: 60+34*cos(347.1°)=60+33.1=93, 56-34*sin(347.1°)=56+7.5=64
    6: 60+34*cos(38.6°)=60+26.6=87, 56-34*sin(38.6°)=56-21.2=35
  -->
  <!-- Ring bonds -->
  <line x1="60" y1="22" x2="33" y2="35" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="33" y1="35" x2="27" y2="64" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="27" y1="64" x2="45" y2="87" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="45" y1="87" x2="75" y2="87" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="75" y1="87" x2="93" y2="64" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="93" y1="64" x2="87" y2="35" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="87" y1="35" x2="60" y2="22" stroke="#1F2937" stroke-width="1.5"/>
  <!-- Cyclic peptide closure indicator (Cys-Cys disulfide or lactam bridge) -->
  <path d="M 60 22 Q 60 10 60 22" stroke="#7090AB" stroke-width="1" opacity="0"/>
  <!-- Bridge between nodes 0 and 6 (lactam bridge, shown as arc inside) -->
  <path d="M 33 35 Q 60 52 87 35" stroke="#7090AB" stroke-width="1" stroke-dasharray="2 2" fill="none" opacity="0.6"/>
  <!-- Center dot for cyclic structure -->
  <circle cx="60" cy="56" r="3" fill="#7090AB" stroke="#1F2937" stroke-width="1" opacity="0.5"/>
  <!-- 7 nodes -->
  <circle cx="60" cy="22" r="5" fill="#7090AB" stroke="#1F2937" stroke-width="1.5" opacity="0.85"/>
  <text x="60" y="25.5" text-anchor="middle" font-size="5" fill="white" font-family="monospace">Ac</text>
  <circle cx="33" cy="35" r="4.5" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="27" cy="64" r="4.5" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="45" cy="87" r="4.5" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="75" cy="87" r="4.5" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="93" cy="64" r="4.5" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <circle cx="87" cy="35" r="4.5" fill="#E5E7EB" stroke="#1F2937" stroke-width="1.5"/>
  <!-- Label -->
  <text x="60" y="106" text-anchor="middle" font-size="8" fill="#1F2937" font-family="monospace">Melanotan-2</text>
  <text x="60" y="116" text-anchor="middle" font-size="6" fill="#6B7280" font-family="monospace">cyclic 7 aa</text>
</svg>
